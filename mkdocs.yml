site_name: Lanternkeeper — Emberfall
site_url: https://wdi-dave-roberts.github.io/lanternkeeper/
repo_url: https://github.com/wdi-dave-roberts/lanternkeeper
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.tooltips

nav:
  - Home: index.md
  - Game Design:
    - Overview: design/index.md
    - Original Vision: design/original-vision.md
    - Game Parameters: design/game-parameters.md
    - Dialogue Guide: content/dialogue-guide.md
    - Quest Guide: content/quest-guide.md
  - Architecture:
    - Technical Decisions: architecture/technical-decisions.md
    - Project Structure: architecture/project-structure.md
  - Reference:
    - Learning Godot:
      - Getting Started: learning/getting-started.md
      - GDScript Basics: learning/gdscript-basics.md
      - Autoloads Explained: learning/autoloads-explained.md
      - Project Setup: learning/project-setup.md
    - How We Work:
      - Roles & Collaboration: workflow/overview.md
      - Git Concepts: workflow/git-concepts.md
      - "GSD Workflow: The Basics": learning/gsd-guide.md
      - GSD Day-to-Day: workflow/gsd-basics.md
      - GSD Advanced: workflow/gsd-advanced.md
      - Claude Code Cheat Sheet: workflow/claude-code-cheatsheet.md
      - Examples: workflow/examples.md
      - Asset Conventions: workflow/asset-conventions.md
    - Quick Lookup:
      - Godot: reference/godot.md
      - Glossary: workflow/glossary.md
    - Working Sessions:
      - "2026-04-11": sessions/2026-04-11.md
    - Brainstorms:
      - "2026-04-10: Architecture & Design": brainstorms/2026-04-10-lanternkeeper-architecture-and-design-brainstorm.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - def_list
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.snippets:
      base_path: ["."]
  - abbr
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
